<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Success</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .success-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
        }

        .success-container h1 {
            color: #388e3c;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .success-container p {
            color: #555;
            margin-bottom: 30px;
            font-size: 16px;
        }

        a {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        a:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <h1>✓ Success!</h1>
        <p th:text="${message}"></p>
        <a href="/login">Go back to Login</a>
    </div>
</body>
</html>
